name: Daily Intelligence Agent - Crawl & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/live.json"
      - "data/price-history.json"
      - "data/market-history.json"
      - "data/quant.json"
      - "data/crawl-audit.json"
      - "data/crawl-quarantine.json"
  schedule:
    # Refresh foreign/China news, public China community/hiring signals,
    # TrendForce prices, and memory peer data twice a day: 06:00 and 18:00 KST.
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intelligence-agent
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Run intelligence agent
        run: npm run crawl

      - name: Validate refreshed intelligence
        run: npm run check

      - name: Reject malformed generated files
        shell: bash
        run: |
          git diff --check
          test ! -n "$(find data -maxdepth 1 -name '*.tmp' -print -quit)"

      - name: Commit refreshed intelligence data
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json data/price-history.json data/market-history.json data/quant.json data/crawl-audit.json data/crawl-quarantine.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily intelligence agent refresh"
            git push
          fi

      - name: Pages deployment note
        run: echo "GitHub Pages is deployed by the repository's branch-based Pages build after main updates."

  notify-source-health:
    name: Source health issue sync
    needs: agent
    if: ${{ always() && needs.agent.result != 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout refreshed main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Open, update, or close source-health issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CRAWL_JOB_RESULT: ${{ needs.agent.result }}
        run: node scripts/report-source-health.mjs
