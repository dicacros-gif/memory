name: Daily Intelligence Agent — Crawl & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily intelligence agent: refresh foreign news, deal flow, prices, and
    # peer data twice a day (06:00 & 18:00 KST). Committing to main triggers
    # the GitHub Pages build that redeploys the site.
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intelligence-agent
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run intelligence agent (crawl fresh foreign data)
        run: node scripts/crawl.mjs || echo "크롤 실패 — 기존 live.json 유지"

      - name: Commit refreshed intelligence data
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json data/price-history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily intelligence agent refresh [skip ci]"
            git push
          fi
