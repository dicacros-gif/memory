name: Daily Intelligence Agent - Crawl & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Refresh foreign/China news, TrendForce prices, and memory peer data
    # twice a day: 06:00 and 18:00 KST.
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intelligence-agent
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run intelligence agent
        run: node scripts/crawl.mjs || echo "Crawler failed - keeping existing live.json"

      - name: Commit refreshed intelligence data
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json data/price-history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily intelligence agent refresh [skip ci]"
            git push
          fi
