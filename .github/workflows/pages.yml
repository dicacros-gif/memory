name: Daily Intelligence Agent — Crawl & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily intelligence agent: refresh foreign news, deal flow, prices, and
    # peer data twice a day (06:00 & 18:00 KST) and redeploy to Pages.
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run intelligence agent (crawl fresh foreign data)
        run: node scripts/crawl.mjs || echo "크롤 실패 — 기존 live.json으로 배포"

      - name: Commit refreshed intelligence data
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json data/price-history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily intelligence agent refresh [skip ci]"
            git push
          fi

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
